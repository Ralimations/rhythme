  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050507;
      color: #e2e8f0;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
    }
    .neon-text-blue { text-shadow: 0 0 15px rgba(96, 165, 250, 0.6); }
    .neon-border-purple { box-shadow: 0 0 20px rgba(168, 85, 247, 0.3); border-color: rgba(168, 85, 247, 0.5); }
    
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* Lighting issue fix: smoother radial gradients */
    .glow-overlay {
      background: radial-gradient(circle at center, var(--tw-gradient-from) 0%, transparent 70%);
      mix-blend-mode: screen;
    }
  </style>
